<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='WhatsApp Image 2025-12-28 at 11.51.07 PM.jpeg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='forgot.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='global-ui.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='responsive.css') }}">
</head>

<body>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">
            <span>{{ message }}</span>
            <button class="close-flash">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="container">
        <div class="form-box">

            <!-- IMPORTANT FIX -->
            <form method="POST" action="{{ url_for('forgot') }}">
                <h1>Forgot Password</h1>

                <div class="input-box">
                    <input type="text" name="username" placeholder="Enter The Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box">
                    <input type="email" name="email" placeholder="Enter the Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <button type="submit" class="btn">Reset Password</button>

                <p class="signup">
                    New user? <a href="{{ url_for('signup') }}">Sign Up</a>
                </p>
            </form>

        </div>
    </div>

    <script src="{{ url_for('static', filename='flash-utils.js') }}"></script>
</body>

</html>
